services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       miushop
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d miushop"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:              production
      DATABASE_URL:          postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/miushop
      JWT_SECRET:            ${JWT_SECRET}
      CORS_ORIGIN:           ${CORS_ORIGIN:-https://miushop.io.vn}
      PORT:                  3001
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET:  ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL:   ${GOOGLE_CALLBACK_URL:-https://api.miushop.io.vn/api/v1/auth/google/callback}
      FRONTEND_URL:          ${FRONTEND_URL:-https://miushop.io.vn}
    networks:
      - internal
      - proxy-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.miushop.io.vn}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV:            production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.miushop.io.vn}
      API_INTERNAL_URL:    http://api:3001
    volumes:
      - ./data/banners:/app/public/banners
      - ./data/avatars:/app/public/avatars
    networks:
      - internal
      - proxy-net

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  proxy-net:
    external: true
