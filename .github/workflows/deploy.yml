name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, miu-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env <<EOF
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          API_INTERNAL_URL=http://api:3001
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          EOF

      - name: Tạo thư mục upload
        run: |
          mkdir -p data/banners data/avatars
          chmod 777 data/banners data/avatars

      - name: Build và deploy
        run: docker compose up -d --build

      - name: Chờ api container healthy
        run: |
          echo "Waiting for api to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q api) 2>/dev/null || echo "unknown")
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ api is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Timeout waiting for api"
              docker compose logs api --tail=50
              exit 1
            fi
            sleep 3
          done

      - name: Migrate + Seed database
        run: docker compose exec -T -e ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} api npm run seed

      - name: Generate product descriptions
        run: docker compose exec -T api npm run gen-desc

      - name: Show logs nếu seed thất bại
        if: failure()
        run: docker compose logs api --tail=80

      - name: Xóa image cũ
        run: docker image prune -f

      - name: Kiểm tra trạng thái
        run: docker compose ps
