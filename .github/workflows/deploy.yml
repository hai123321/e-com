name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  generate-migrations:
    runs-on: [self-hosted, miu-server]
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Cần token để có thể push lại migration files
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate migrations nếu schema thay đổi
        run: npx drizzle-kit generate --config drizzle.config.ts
        working-directory: backend

      - name: Kiểm tra có file migration mới không
        id: check
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit và push migration files
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/drizzle/
          git commit -m "chore: auto-generate drizzle migrations [skip ci]"
          git push

  deploy:
    runs-on: [self-hosted, miu-server]
    needs: generate-migrations
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Pull lại để lấy migration files vừa commit (nếu có)
          ref: main

      - name: Create .env file
        run: |
          cat > .env <<EOF
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          API_INTERNAL_URL=http://api:3001
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          EOF

      - name: Build và deploy
        run: docker compose up -d --build

      - name: Chạy migrations
        run: docker compose exec -T api npm run migrate

      - name: Seed database (bỏ qua nếu đã có data)
        run: docker compose exec -T -e ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} api npm run seed

      - name: Xóa image cũ
        run: docker image prune -f

      - name: Kiểm tra trạng thái
        run: docker compose ps
