name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, miu-server-e-com]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env <<EOF
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          API_INTERNAL_URL=http://api:3001
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          EOF

      - name: Build và deploy
        run: |
          docker compose pull --ignore-buildable
          docker compose up -d --build

      - name: Chạy migrations và seed
        run: |
          docker compose exec -T api sh -c "
            npm run migrate 2>/dev/null || npx drizzle-kit migrate
          "
          docker compose exec -T api sh -c "
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} node -e \"
              import('./scripts/seed.js').catch(() =>
                import('./dist/scripts/seed.js')
              )
            \" 2>/dev/null || true
          "

      - name: Xóa image cũ
        run: docker image prune -f

      - name: Kiểm tra trạng thái
        run: docker compose ps
