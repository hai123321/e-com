# HTTP — ACME challenge only, redirect rest to HTTPS
server {
    listen 80;
    server_name miushop.io.vn www.miushop.io.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://miushop.io.vn$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name miushop.io.vn www.miushop.io.vn;

    ssl_certificate     /etc/letsencrypt/live/miushop.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miushop.io.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # Redirect www → non-www
    if ($host = www.miushop.io.vn) {
        return 301 https://miushop.io.vn$request_uri;
    }

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js app
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
